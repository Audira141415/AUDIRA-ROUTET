appId: com.audira.route
productName: Audira Route
directories:
  output: dist
  buildResources: resources
files:
  - "src/**/*"
  - "node_modules/**/*"
  - "main.js"
  - "package.json"
extraResources:
  - from: "../.next/standalone"
    to: "server"
    filter:
      - "**/*"
  - from: "../.next/static"
    to: "server/.next/static"
    filter:
      - "**/*"
  - from: "../public"
    to: "server/public"
    filter:
      - "**/*"
win:
  target: nsis
  icon: resources/icon.ico
mac:
  target: dmg
  icon: resources/icon.png
  category: public.app-category.developer-tools
linux:
  target: AppImage
  icon: resources/icon.png
  category: Development
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
publish:
  provider: github
  owner: audira
  repo: audira-route
